[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "ebay-cf-tool"
version = "0.1.0"
description = "CLI e bot Telegram per leggere codici fiscali dagli ordini eBay (API ufficiali)."
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
authors = [{ name = "eBay CF Tool" }]

[project.scripts]
ebay-cf = "ebay_cf_tool:main"
ebay-telegram-bot = "telegram_bot:run_bot"
ebay-cf-fix-git-lock = "ebay_cf.git_utils:main"

[project.optional-dependencies]
dev = [
  "build>=1.2.2",
  "mypy>=1.18.2",
  "ruff==0.15.9",
]

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools]
py-modules = ["ebay_cf_tool", "telegram_bot"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
target-version = "py310"
line-length = 100
src = ["src", "tests"]

[tool.ruff.lint]
select = [
  "E",
  "F",
  "I",
]

[tool.mypy]
python_version = "3.10"
files = [
  "src/ebay_cf/models.py",
  "src/ebay_cf/config.py",
  "src/ebay_cf/storage/sqlite.py",
  "src/ebay_cf/git_utils.py",
]
strict = true
