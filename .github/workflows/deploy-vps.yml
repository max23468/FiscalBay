name: Deploy VPS

on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: Git ref or SHA to deploy on the VPS
        required: false
        default: main

permissions:
  contents: read

concurrency:
  group: deploy-vps-${{ inputs.target_ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Linux VPS
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      APP_DIR: /opt/fiscalbay
      SERVICE_NAME: fiscalbay-bot
      OAUTH_SERVICE_NAME: fiscalbay-oauth
      FISCALBAY_VPS_HOST: ${{ secrets.FISCALBAY_VPS_HOST }}
      FISCALBAY_VPS_USER: ${{ secrets.FISCALBAY_VPS_USER }}
      FISCALBAY_VPS_PORT: ${{ secrets.FISCALBAY_VPS_PORT }}
      FISCALBAY_VPS_SSH_KNOWN_HOSTS: ${{ secrets.FISCALBAY_VPS_SSH_KNOWN_HOSTS }}
      TARGET_REF: ${{ inputs.target_ref }}

    steps:
      - name: Checkout target revision
        uses: actions/checkout@v6
        with:
          ref: ${{ env.TARGET_REF }}

      - name: Validate deploy secrets
        env:
          FISCALBAY_VPS_SSH_PRIVATE_KEY_B64: ${{ secrets.FISCALBAY_VPS_SSH_PRIVATE_KEY_B64 }}
        run: |
          set -euo pipefail

          missing=0
          for var in FISCALBAY_VPS_HOST FISCALBAY_VPS_SSH_PRIVATE_KEY_B64; do
            if [ -z "${!var:-}" ]; then
              echo "::error::Missing required secret: ${var}"
              missing=1
            fi
          done

          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

      - name: Set deploy defaults
        run: |
          set -euo pipefail

          echo "FISCALBAY_VPS_USER=${FISCALBAY_VPS_USER:-opc}" >> "${GITHUB_ENV}"
          echo "FISCALBAY_VPS_PORT=${FISCALBAY_VPS_PORT:-22}" >> "${GITHUB_ENV}"

      - name: Prepare SSH key
        env:
          FISCALBAY_VPS_SSH_PRIVATE_KEY_B64: ${{ secrets.FISCALBAY_VPS_SSH_PRIVATE_KEY_B64 }}
        run: |
          set -euo pipefail

          mkdir -p "${HOME}/.ssh"
          printf '%s' "${FISCALBAY_VPS_SSH_PRIVATE_KEY_B64}" | base64 --decode > "${HOME}/.ssh/fiscalbay_vps"
          chmod 600 "${HOME}/.ssh/fiscalbay_vps"

      - name: Prepare known_hosts
        run: |
          set -euo pipefail

          mkdir -p "${HOME}/.ssh"
          touch "${HOME}/.ssh/known_hosts"
          chmod 644 "${HOME}/.ssh/known_hosts"

          if [ -n "${FISCALBAY_VPS_SSH_KNOWN_HOSTS:-}" ]; then
            printf '%s\n' "${FISCALBAY_VPS_SSH_KNOWN_HOSTS}" > "${HOME}/.ssh/known_hosts"
            echo "SSH_STRICT=yes" >> "${GITHUB_ENV}"
          else
            echo "SSH_STRICT=accept-new" >> "${GITHUB_ENV}"
          fi

      - name: Sync repository to VPS
        run: |
          set -euo pipefail

          export COPYFILE_DISABLE=1

          tar \
            --exclude=.git \
            --exclude=.venv \
            --exclude=.mypy_cache \
            --exclude=.pytest_cache \
            --exclude=__pycache__ \
            --exclude='.coverage*' \
            -czf - . \
          | ssh \
              -i "${HOME}/.ssh/fiscalbay_vps" \
              -p "${FISCALBAY_VPS_PORT}" \
              -o BatchMode=yes \
              -o ConnectTimeout=15 \
              -o ServerAliveInterval=30 \
              -o StrictHostKeyChecking="${SSH_STRICT}" \
              "${FISCALBAY_VPS_USER}@${FISCALBAY_VPS_HOST}" \
              "sudo mkdir -p \"${APP_DIR}\" && sudo find \"${APP_DIR}\" -mindepth 1 -maxdepth 1 ! -name '.env' ! -name '.env.bak-*' ! -name '.venv' ! -name 'data' -exec rm -rf {} + && sudo tar --no-same-owner --no-same-permissions -xzf - -C \"${APP_DIR}\""

      - name: Install and restart on VPS
        run: |
          set -euo pipefail

          ssh \
            -i "${HOME}/.ssh/fiscalbay_vps" \
            -p "${FISCALBAY_VPS_PORT}" \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            -o ServerAliveInterval=30 \
            -o StrictHostKeyChecking="${SSH_STRICT}" \
            "${FISCALBAY_VPS_USER}@${FISCALBAY_VPS_HOST}" \
            "sudo APP_DIR=\"${APP_DIR}\" APP_USER=fiscalbay APP_GROUP=fiscalbay bash \"${APP_DIR}/deploy/install-vps.sh\""

      - name: Collect VPS diagnostics on failure
        if: failure()
        run: |
          set +e

          ssh \
            -i "${HOME}/.ssh/fiscalbay_vps" \
            -p "${FISCALBAY_VPS_PORT}" \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            -o ServerAliveInterval=30 \
            -o StrictHostKeyChecking="${SSH_STRICT}" \
            "${FISCALBAY_VPS_USER}@${FISCALBAY_VPS_HOST}" \
            "sudo bash -lc '
              echo \"=== ${SERVICE_NAME} ===\"
              systemctl status \"${SERVICE_NAME}\" --no-pager || true
              echo
              echo \"=== ${OAUTH_SERVICE_NAME} ===\"
              systemctl status \"${OAUTH_SERVICE_NAME}\" --no-pager || true
              echo
              echo \"=== recent journal: ${SERVICE_NAME} ===\"
              journalctl -u \"${SERVICE_NAME}\" -n 60 --no-pager || true
              echo
              echo \"=== recent journal: ${OAUTH_SERVICE_NAME} ===\"
              journalctl -u \"${OAUTH_SERVICE_NAME}\" -n 60 --no-pager || true
            '"

      - name: Write deploy summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
        run: |
          {
            echo "## Deploy VPS"
            echo
            echo "- Status: ${JOB_STATUS}"
            echo "- Ref: \`${TARGET_REF}\`"
            echo "- Host: \`${FISCALBAY_VPS_HOST}\`"
            echo "- App dir: \`${APP_DIR}\`"
            echo "- Preserved runtime paths on sync: \`.env\`, \`.env.bak-*\`, \`.venv\`, \`data\`"
          } >> "${GITHUB_STEP_SUMMARY}"
