name: Bug report
description: Report a defect with reproducible steps.
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Provide exact commands, inputs, and context.
      placeholder: |
        1. Run `...`
        2. Observe `...`
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Python version, OS, relevant env vars (redacted).
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / traces
      description: Paste relevant output. Remove secrets.
      render: shell
