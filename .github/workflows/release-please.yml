name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    timeout-minutes: 10
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4.4.1
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN != '' && secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Log release-please outputs
        env:
          HAS_RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN != '' }}
          PR_OUTPUT: ${{ steps.release.outputs.pr }}
          PRS_OUTPUT: ${{ steps.release.outputs.prs }}
        run: |
          echo "has_release_please_token=${HAS_RELEASE_PLEASE_TOKEN}"
          echo "release_created=${{ steps.release.outputs.release_created }}"
          echo "prs_created=${{ steps.release.outputs.prs_created }}"
          printf 'pr=%s\n' "$PR_OUTPUT"
          printf 'prs=%s\n' "$PRS_OUTPUT"

      - name: Checkout repository
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.release.outputs.tag_name }}

      - name: Setup Python
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        if: ${{ steps.release.outputs.release_created }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[dev]

      - name: Build distribution artifacts
        if: ${{ steps.release.outputs.release_created }}
        run: python -m build

      - name: Upload release artifacts
        if: ${{ steps.release.outputs.release_created }}
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN != '' && secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ steps.release.outputs.tag_name }}" dist/* --clobber
