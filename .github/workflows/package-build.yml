name: Package Build

on:
  pull_request:
    branches:
      - main
    paths:
      - "pyproject.toml"
      - "setup.py"
      - "setup.cfg"
      - "MANIFEST.in"
      - "src/fiscalbay/__init__.py"
  workflow_dispatch:

concurrency:
  group: package-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build package
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install build backend
        run: python -m pip install --upgrade pip build

      - name: Build package
        run: python -m build
