name: Configure Public Access

on:
  workflow_dispatch:
    inputs:
      public_domain:
        description: "Public HTTPS domain for FiscalBay OAuth"
        required: true
        type: string
        default: "fiscalbay.duckdns.org"
      expected_ipv4:
        description: "Expected public IPv4 for the VPS"
        required: false
        type: string
        default: ""
      issue_certificate:
        description: "Run certbot for the public domain"
        required: false
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: configure-public-access-${{ inputs.public_domain }}
  cancel-in-progress: false

jobs:
  configure:
    name: Configure nginx, HTTPS and OAuth URLs
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      APP_DIR: /opt/fiscalbay
      PUBLIC_DOMAIN: ${{ inputs.public_domain }}
      EXPECTED_IPV4: ${{ inputs.expected_ipv4 }}
      ISSUE_CERTIFICATE: ${{ inputs.issue_certificate }}
      FISCALBAY_VPS_HOST: ${{ secrets.FISCALBAY_VPS_HOST }}
      FISCALBAY_VPS_USER: ${{ secrets.FISCALBAY_VPS_USER }}
      FISCALBAY_VPS_PORT: ${{ secrets.FISCALBAY_VPS_PORT }}
      FISCALBAY_VPS_SSH_KNOWN_HOSTS: ${{ secrets.FISCALBAY_VPS_SSH_KNOWN_HOSTS }}

    steps:
      - name: Validate secrets
        env:
          FISCALBAY_VPS_SSH_PRIVATE_KEY_B64: ${{ secrets.FISCALBAY_VPS_SSH_PRIVATE_KEY_B64 }}
        run: |
          set -euo pipefail

          missing=0
          for var in FISCALBAY_VPS_HOST FISCALBAY_VPS_SSH_PRIVATE_KEY_B64; do
            if [ -z "${!var:-}" ]; then
              echo "::error::Missing required secret: ${var}"
              missing=1
            fi
          done

          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

      - name: Set defaults
        run: |
          set -euo pipefail

          echo "FISCALBAY_VPS_USER=${FISCALBAY_VPS_USER:-opc}" >> "${GITHUB_ENV}"
          echo "FISCALBAY_VPS_PORT=${FISCALBAY_VPS_PORT:-22}" >> "${GITHUB_ENV}"

      - name: Prepare SSH key
        env:
          FISCALBAY_VPS_SSH_PRIVATE_KEY_B64: ${{ secrets.FISCALBAY_VPS_SSH_PRIVATE_KEY_B64 }}
        run: |
          set -euo pipefail

          install -d -m 700 "${HOME}/.ssh"
          printf '%s' "${FISCALBAY_VPS_SSH_PRIVATE_KEY_B64}" | base64 --decode > "${HOME}/.ssh/fiscalbay_vps"
          chmod 600 "${HOME}/.ssh/fiscalbay_vps"

      - name: Prepare known_hosts
        run: |
          set -euo pipefail

          install -d -m 700 "${HOME}/.ssh"
          touch "${HOME}/.ssh/known_hosts"
          chmod 600 "${HOME}/.ssh/known_hosts"

          if [ -n "${FISCALBAY_VPS_SSH_KNOWN_HOSTS:-}" ]; then
            printf '%s\n' "${FISCALBAY_VPS_SSH_KNOWN_HOSTS}" > "${HOME}/.ssh/known_hosts"
            echo "SSH_STRICT=yes" >> "${GITHUB_ENV}"
          else
            echo "SSH_STRICT=accept-new" >> "${GITHUB_ENV}"
          fi

      - name: Configure public access on VPS
        run: |
          set -euo pipefail

          ssh \
            -i "${HOME}/.ssh/fiscalbay_vps" \
            -p "${FISCALBAY_VPS_PORT}" \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            -o ServerAliveInterval=30 \
            -o StrictHostKeyChecking="${SSH_STRICT}" \
            "${FISCALBAY_VPS_USER}@${FISCALBAY_VPS_HOST}" \
            "sudo PUBLIC_DOMAIN='${PUBLIC_DOMAIN}' EXPECTED_IPV4='${EXPECTED_IPV4}' ISSUE_CERTIFICATE='${ISSUE_CERTIFICATE}' APP_DIR='${APP_DIR}' bash -s" <<'REMOTE_SCRIPT'
          set -euo pipefail

          if [ -z "${PUBLIC_DOMAIN:-}" ]; then
            echo "PUBLIC_DOMAIN mancante" >&2
            exit 1
          fi

          if command -v dnf >/dev/null 2>&1; then
            dnf install -y nginx certbot python3-certbot-nginx curl bind-utils
          elif command -v apt-get >/dev/null 2>&1; then
            apt-get update
            apt-get install -y nginx certbot python3-certbot-nginx curl dnsutils
          else
            echo "Package manager non supportato per installazione automatica nginx/certbot" >&2
            exit 1
          fi

          systemctl enable --now nginx

          vps_ip="${EXPECTED_IPV4:-}"
          if [ -z "${vps_ip}" ]; then
            vps_ip="$(curl -fsS --max-time 10 https://api.ipify.org || true)"
          fi
          resolved_ip="$(dig +short A "${PUBLIC_DOMAIN}" | tail -n 1 || true)"

          echo "VPS public IPv4: ${vps_ip:-unknown}"
          echo "${PUBLIC_DOMAIN} resolves to: ${resolved_ip:-empty}"

          if [ -z "${resolved_ip}" ]; then
            echo "Il dominio non risolve ancora: ${PUBLIC_DOMAIN}" >&2
            exit 1
          fi

          if [ -n "${vps_ip}" ] && [ "${resolved_ip}" != "${vps_ip}" ]; then
            echo "DNS non allineato: ${PUBLIC_DOMAIN} punta a ${resolved_ip}, ma la VPS risulta ${vps_ip}." >&2
            echo "Aggiorna Duck DNS prima di emettere il certificato." >&2
            exit 1
          fi

          nginx_conf="/etc/nginx/conf.d/fiscalbay-oauth.conf"
          if [ -f "${APP_DIR}/deploy/nginx-fiscalbay-oauth-site.conf" ]; then
            sed "s/fiscalbay.example.com/${PUBLIC_DOMAIN}/g" \
              "${APP_DIR}/deploy/nginx-fiscalbay-oauth-site.conf" > "${nginx_conf}"
          else
            {
              echo "server {"
              echo "    listen 80;"
              echo "    listen [::]:80;"
              echo "    server_name ${PUBLIC_DOMAIN};"
              echo
              echo "    location = /healthz { proxy_pass http://127.0.0.1:8787/healthz; }"
              echo "    location = /privacy { proxy_pass http://127.0.0.1:8787/privacy; }"
              echo "    location = /about { proxy_pass http://127.0.0.1:8787/about; }"
              echo "    location /oauth/ { proxy_pass http://127.0.0.1:8787; }"
              echo "}"
            } > "${nginx_conf}"
          fi

          nginx -t
          systemctl reload nginx

          if [ "${ISSUE_CERTIFICATE}" = "true" ]; then
            certbot --nginx --non-interactive --agree-tos \
              --register-unsafely-without-email \
              --redirect \
              -d "${PUBLIC_DOMAIN}"
            timeout 45 certbot renew --dry-run --cert-name "${PUBLIC_DOMAIN}" \
              || echo "Certbot dry-run non completato entro il timeout; certificato reale gia' installato."
          fi

          env_file="${APP_DIR}/.env"
          touch "${env_file}"
          chmod 600 "${env_file}"

          set_env_value() {
            key="$1"
            value="$2"
            if grep -q "^${key}=" "${env_file}"; then
              sed -i "s|^${key}=.*|${key}=${value}|" "${env_file}"
            else
              printf '%s=%s\n' "${key}" "${value}" >> "${env_file}"
            fi
          }

          set_env_value EBAY_OAUTH_CONNECT_BASE_URL "https://${PUBLIC_DOMAIN}/oauth/start"
          set_env_value EBAY_OAUTH_CALLBACK_URL "https://${PUBLIC_DOMAIN}/oauth/callback"
          set_env_value EBAY_OAUTH_SERVER_HOST "127.0.0.1"
          set_env_value EBAY_OAUTH_SERVER_PORT "8787"

          systemctl enable --now fiscalbay-oauth
          systemctl restart fiscalbay-oauth
          systemctl is-active --quiet fiscalbay-oauth

          for attempt in $(seq 1 12); do
            if curl -fsS "https://${PUBLIC_DOMAIN}/healthz" >/tmp/fiscalbay-healthz.txt \
              && curl -fsS "https://${PUBLIC_DOMAIN}/privacy" >/tmp/fiscalbay-privacy.html \
              && curl -fsS "https://${PUBLIC_DOMAIN}/about" >/tmp/fiscalbay-about.html; then
              break
            fi
            if [ "${attempt}" -eq 12 ]; then
              exit 1
            fi
            echo "Endpoint pubblici non ancora stabili (${attempt}/12), nuovo tentativo tra 5s..."
            sleep 5
          done

          echo "Configurazione pubblica completata per https://${PUBLIC_DOMAIN}"
          REMOTE_SCRIPT

      - name: Write summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
        run: |
          {
            echo "## Configure Public Access"
            echo
            echo "- Status: ${JOB_STATUS}"
            echo "- Domain: \`${PUBLIC_DOMAIN}\`"
            echo "- VPS host secret: \`${FISCALBAY_VPS_HOST}\`"
            echo "- OAuth connect URL: \`https://${PUBLIC_DOMAIN}/oauth/start\`"
            echo "- OAuth callback URL: \`https://${PUBLIC_DOMAIN}/oauth/callback\`"
          } >> "${GITHUB_STEP_SUMMARY}"
