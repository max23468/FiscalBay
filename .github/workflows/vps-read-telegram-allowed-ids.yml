name: VPS Read Telegram Allowed IDs

on:
  workflow_dispatch:
    inputs:
      set_all:
        description: "Set TELEGRAM_ALLOWED_CHAT_IDS=* before reading"
        required: false
        type: boolean
        default: false
      set_identity_scope:
        description: "Ensure EBAY_SCOPES includes commerce.identity.readonly on VPS"
        required: false
        type: boolean
        default: false
      run_order_diagnostic:
        description: "Run production order diagnostic on VPS"
        required: false
        type: boolean
        default: true
      created_after:
        description: "Diagnostic UTC start ISO-8601"
        required: false
        type: string
        default: "2026-04-25T00:00:00Z"
      created_before:
        description: "Diagnostic UTC end ISO-8601"
        required: false
        type: string
        default: "2026-04-26T23:59:59Z"
      max_results:
        description: "Diagnostic max results"
        required: false
        type: string
        default: "200"

jobs:
  read_allowed_ids:
    name: Read TELEGRAM_ALLOWED_CHAT_IDS from VPS
    runs-on: ubuntu-latest
    env:
      FISCALBAY_VPS_HOST: ${{ secrets.FISCALBAY_VPS_HOST }}
      FISCALBAY_VPS_USER: ${{ secrets.FISCALBAY_VPS_USER }}
      FISCALBAY_VPS_PORT: ${{ secrets.FISCALBAY_VPS_PORT }}
      FISCALBAY_VPS_SSH_KNOWN_HOSTS: ${{ secrets.FISCALBAY_VPS_SSH_KNOWN_HOSTS }}
      CREATED_AFTER: ${{ inputs.created_after }}
      CREATED_BEFORE: ${{ inputs.created_before }}
      MAX_RESULTS: ${{ inputs.max_results }}

    steps:
      - name: Validate read secrets
        env:
          FISCALBAY_VPS_SSH_PRIVATE_KEY_B64: ${{ secrets.FISCALBAY_VPS_SSH_PRIVATE_KEY_B64 }}
        run: |
          set -euo pipefail
          for var in FISCALBAY_VPS_HOST FISCALBAY_VPS_SSH_PRIVATE_KEY_B64; do
            if [ -z "${!var:-}" ]; then
              echo "Missing required secret: ${var}" >&2
              exit 1
            fi
          done

      - name: Set defaults
        run: |
          set -euo pipefail
          echo "FISCALBAY_VPS_USER=${FISCALBAY_VPS_USER:-opc}" >> "${GITHUB_ENV}"
          echo "FISCALBAY_VPS_PORT=${FISCALBAY_VPS_PORT:-22}" >> "${GITHUB_ENV}"

      - name: Prepare SSH key
        env:
          FISCALBAY_VPS_SSH_PRIVATE_KEY_B64: ${{ secrets.FISCALBAY_VPS_SSH_PRIVATE_KEY_B64 }}
        run: |
          set -euo pipefail
          install -d -m 700 "${HOME}/.ssh"
          printf '%s' "${FISCALBAY_VPS_SSH_PRIVATE_KEY_B64}" | base64 --decode > "${HOME}/.ssh/fiscalbay_vps"
          chmod 600 "${HOME}/.ssh/fiscalbay_vps"

      - name: Prepare known_hosts
        run: |
          set -euo pipefail
          if [ -n "${FISCALBAY_VPS_SSH_KNOWN_HOSTS:-}" ]; then
            printf '%s\n' "${FISCALBAY_VPS_SSH_KNOWN_HOSTS}" > "${HOME}/.ssh/known_hosts"
            chmod 600 "${HOME}/.ssh/known_hosts"
            echo "SSH_STRICT=yes" >> "${GITHUB_ENV}"
          else
            echo "SSH_STRICT=accept-new" >> "${GITHUB_ENV}"
          fi

      - name: Read TELEGRAM_ALLOWED_CHAT_IDS on VPS
        run: |
          set -euo pipefail
          if [ "${{ inputs.set_all }}" = "true" ]; then
            ssh \
              -i "${HOME}/.ssh/fiscalbay_vps" \
              -p "${FISCALBAY_VPS_PORT}" \
              -o BatchMode=yes \
              -o ConnectTimeout=15 \
              -o ServerAliveInterval=30 \
              -o StrictHostKeyChecking="${SSH_STRICT}" \
              "${FISCALBAY_VPS_USER}@${FISCALBAY_VPS_HOST}" \
              "sudo bash -lc 'if grep -q \"^TELEGRAM_ALLOWED_CHAT_IDS=\" /opt/fiscalbay/.env; then sed -i \"s/^TELEGRAM_ALLOWED_CHAT_IDS=.*/TELEGRAM_ALLOWED_CHAT_IDS=*/\" /opt/fiscalbay/.env; else echo \"TELEGRAM_ALLOWED_CHAT_IDS=*\" >> /opt/fiscalbay/.env; fi; systemctl restart fiscalbay-bot'"
          fi

          VALUE="$(ssh \
            -i "${HOME}/.ssh/fiscalbay_vps" \
            -p "${FISCALBAY_VPS_PORT}" \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            -o ServerAliveInterval=30 \
            -o StrictHostKeyChecking="${SSH_STRICT}" \
            "${FISCALBAY_VPS_USER}@${FISCALBAY_VPS_HOST}" \
            "sudo sed -n 's/^TELEGRAM_ALLOWED_CHAT_IDS=//p' /opt/fiscalbay/.env")"

          if [ -z "${VALUE}" ]; then
            VALUE="(empty)"
          fi

          echo "TELEGRAM_ALLOWED_CHAT_IDS=${VALUE}"
          {
            echo "## VPS TELEGRAM_ALLOWED_CHAT_IDS"
            echo
            echo "\`${VALUE}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Ensure EBAY_SCOPES includes identity scope
        if: ${{ inputs.set_identity_scope }}
        run: |
          set -euo pipefail
          ssh \
            -i "${HOME}/.ssh/fiscalbay_vps" \
            -p "${FISCALBAY_VPS_PORT}" \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            -o ServerAliveInterval=30 \
            -o StrictHostKeyChecking="${SSH_STRICT}" \
            "${FISCALBAY_VPS_USER}@${FISCALBAY_VPS_HOST}" \
            "sudo bash -s" <<'REMOTE_SCRIPT'
          set -euo pipefail
          ENV_FILE="/opt/fiscalbay/.env"
          SCOPE_FULFILLMENT="https://api.ebay.com/oauth/api_scope/sell.fulfillment.readonly"
          SCOPE_IDENTITY="https://api.ebay.com/oauth/api_scope/commerce.identity.readonly"

          current="$(sed -n 's/^EBAY_SCOPES=//p' "${ENV_FILE}" | head -n 1)"
          if [ -z "${current}" ]; then
            merged="${SCOPE_FULFILLMENT} ${SCOPE_IDENTITY}"
          else
            merged="${current}"
            case " ${merged} " in
              *" ${SCOPE_FULFILLMENT} "*) ;;
              *) merged="${merged} ${SCOPE_FULFILLMENT}" ;;
            esac
            case " ${merged} " in
              *" ${SCOPE_IDENTITY} "*) ;;
              *) merged="${merged} ${SCOPE_IDENTITY}" ;;
            esac
          fi
          merged="$(printf '%s' "${merged}" | xargs)"

          if grep -q '^EBAY_SCOPES=' "${ENV_FILE}"; then
            sed -i "s|^EBAY_SCOPES=.*|EBAY_SCOPES=\"${merged}\"|" "${ENV_FILE}"
          else
            printf '\nEBAY_SCOPES=\"%s\"\n' "${merged}" >> "${ENV_FILE}"
          fi

          systemctl try-restart fiscalbay-oauth.service || true
          systemctl try-restart fiscalbay-bot.service || true
          REMOTE_SCRIPT

          {
            echo "## VPS EBAY_SCOPES update"
            echo
            echo "Aggiornamento scope applicato e servizi riavviati (try-restart)."
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Read EBAY_SCOPES on VPS
        if: ${{ inputs.run_order_diagnostic }}
        run: |
          set -euo pipefail
          SCOPES_VALUE="$(ssh \
            -i "${HOME}/.ssh/fiscalbay_vps" \
            -p "${FISCALBAY_VPS_PORT}" \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            -o ServerAliveInterval=30 \
            -o StrictHostKeyChecking="${SSH_STRICT}" \
            "${FISCALBAY_VPS_USER}@${FISCALBAY_VPS_HOST}" \
            "sudo sed -n 's/^EBAY_SCOPES=//p' /opt/fiscalbay/.env")"

          if [ -z "${SCOPES_VALUE}" ]; then
            SCOPES_VALUE="(empty)"
          fi

          printf '%s\n' "${SCOPES_VALUE}" > ebay_scopes.txt
          echo "EBAY_SCOPES=${SCOPES_VALUE}"

          {
            echo "## VPS EBAY_SCOPES"
            echo
            echo "\`\`\`"
            cat ebay_scopes.txt
            echo "\`\`\`"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Run production order diagnostic on VPS
        if: ${{ inputs.run_order_diagnostic }}
        run: |
          set -euo pipefail
          ssh \
            -i "${HOME}/.ssh/fiscalbay_vps" \
            -p "${FISCALBAY_VPS_PORT}" \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            -o ServerAliveInterval=30 \
            -o StrictHostKeyChecking="${SSH_STRICT}" \
            "${FISCALBAY_VPS_USER}@${FISCALBAY_VPS_HOST}" \
            "CREATED_AFTER='${CREATED_AFTER}' CREATED_BEFORE='${CREATED_BEFORE}' MAX_RESULTS='${MAX_RESULTS}' bash -s" \
            > diagnostic_orders.json <<'REMOTE_SCRIPT'
          set -euo pipefail
          sudo -u fiscalbay -H bash -lc '
            set -euo pipefail
            cd /opt/fiscalbay
            PYTHON_BIN=""
            for candidate in .venv/bin/python venv/bin/python; do
              if [ -x "${candidate}" ]; then
                PYTHON_BIN="${candidate}"
                break
              fi
            done
            if [ -z "${PYTHON_BIN}" ]; then
              PYTHON_BIN="$(command -v python3)"
            fi
            "${PYTHON_BIN}" -c "import sys; assert sys.version_info >= (3, 10), \"Python runtime non supportato per FiscalBay (richiesto >= 3.10)\""
            set -a
            [ -f .env ] && source .env
            set +a
            EBAY_SCOPES="https://api.ebay.com/oauth/api_scope/sell.fulfillment.readonly" \
            PYTHONPATH=src "${PYTHON_BIN}" -m fiscalbay.cli \
              --environment production \
              --created-after "'"${CREATED_AFTER}"'" \
              --created-before "'"${CREATED_BEFORE}"'" \
              --max-results "'"${MAX_RESULTS}"'" \
              --format json
          '
          REMOTE_SCRIPT

          python3 -c "import json; data=json.load(open('diagnostic_orders.json')); print(f'Fetched orders: {len(data)}'); print('First orderId:', (data[0].get('orderId','n/d') if data else 'n/d'))"

          COUNT="$(python3 -c "import json;print(len(json.load(open('diagnostic_orders.json'))))")"
          {
            echo "## VPS Order Diagnostic"
            echo
            echo "- Window: \`${CREATED_AFTER}\` → \`${CREATED_BEFORE}\`"
            echo "- Max results: \`${MAX_RESULTS}\`"
            echo "- Orders fetched: \`${COUNT}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Run eBay identity diagnostic on VPS
        if: ${{ inputs.run_order_diagnostic }}
        continue-on-error: true
        run: |
          set -euo pipefail
          ssh \
            -i "${HOME}/.ssh/fiscalbay_vps" \
            -p "${FISCALBAY_VPS_PORT}" \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            -o ServerAliveInterval=30 \
            -o StrictHostKeyChecking="${SSH_STRICT}" \
            "${FISCALBAY_VPS_USER}@${FISCALBAY_VPS_HOST}" \
            "bash -s" > identity_profile.json <<'REMOTE_SCRIPT'
          set -euo pipefail
          sudo -u fiscalbay -H bash -lc '
            set -euo pipefail
            cd /opt/fiscalbay
            PYTHON_BIN=""
            for candidate in .venv/bin/python venv/bin/python; do
              if [ -x "${candidate}" ]; then
                PYTHON_BIN="${candidate}"
                break
              fi
            done
            if [ -z "${PYTHON_BIN}" ]; then
              PYTHON_BIN="$(command -v python3)"
            fi
            set -a
            [ -f .env ] && source .env
            set +a
            PYTHONPATH=src "${PYTHON_BIN}" -c "import json; from fiscalbay.clients.ebay import request_user_access_token_response; from fiscalbay.config import load_config; config=load_config(\"production\"); token_response=request_user_access_token_response(config); scope=str(token_response.get(\"scope\") or \"\"); out={\"token_scope\": scope, \"has_identity_scope\": (\"commerce.identity.readonly\" in scope)}; print(json.dumps(out, ensure_ascii=False))"
          '
          REMOTE_SCRIPT

          python3 -c "import json; p=json.load(open('identity_profile.json')); has_scope=bool(p.get('has_identity_scope',False)); scope=p.get('token_scope',''); print(f'Has identity scope: {has_scope}'); open('identity_summary.txt','w',encoding='utf-8').write(f'has_identity_scope={has_scope}\\ntoken_scope={scope}\\n')"

          {
            echo "## VPS eBay Identity"
            echo
            echo "\`\`\`"
            cat identity_summary.txt
            echo "\`\`\`"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload diagnostic artifact
        if: ${{ inputs.run_order_diagnostic }}
        uses: actions/upload-artifact@v4
        with:
          name: vps-diagnostic-orders
          path: |
            diagnostic_orders.json
            identity_profile.json
            identity_summary.txt
            ebay_scopes.txt
