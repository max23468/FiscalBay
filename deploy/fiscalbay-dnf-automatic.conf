# FiscalBay: aggiornamento automatico completo dell'OS via dnf-automatic (RHEL/OL9).
# Installato in /etc/dnf/automatic.conf da deploy/install-auto-updates.sh.
# Applica TUTTI gli update (non solo security) e riavvia da solo quando serve,
# nella finestra notturna impostata dal timer (vedi install-auto-updates.sh).
#
# best=0 evita che un singolo conflitto irrisolvibile (es. tuned/OCI, come emerso
# nel patching manuale) blocchi l'intera transazione: si applica tutto il resto.

[commands]
upgrade_type = default
random_sleep = 0
network_online_timeout = 60
download_updates = yes
apply_updates = yes
reboot = when-needed
reboot_command = "shutdown -r +5 'FiscalBay: reboot post aggiornamento automatico'"

[emitters]
emit_via = stdio
system_name = fiscalbay-bot

[base]
best = 0
