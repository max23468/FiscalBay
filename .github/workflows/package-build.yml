name: Package Build

on:
  workflow_dispatch:

concurrency:
  group: package-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build package
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install build backend
        run: python -m pip install --upgrade pip build

      - name: Build package
        run: python -m build
