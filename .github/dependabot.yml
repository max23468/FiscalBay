# Dependabot version updates.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Limiti piu' alti + raggruppamento per evitare starvation: con limite basso i
# pochi slot venivano occupati da PR non mergiate e gli altri update non
# ottenevano mai una PR (es. #115 rimasta aperta per settimane).
# Le PR idonee vengono chiuse in auto-merge dopo CI verde
# (.github/workflows/dependabot-auto-merge.yml), quindi la coda non si accumula.

version: 2
updates:
  - package-ecosystem: pip
    directory: /
    open-pull-requests-limit: 10
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Rome
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope
    labels:
      - dependencies
      - python
    groups:
      # Un'unica PR per tutti i minor/patch (auto-merge dopo CI). I major restano
      # PR singole: quelli runtime (cryptography) hanno review manuale.
      python-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    open-pull-requests-limit: 10
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: Europe/Rome
    commit-message:
      prefix: ci
      include: scope
    labels:
      - dependencies
      - github-actions
    groups:
      # Un'unica PR per tutte le Action (anche major): basso rischio e gated
      # dalla CI, quindi in auto-merge.
      github-actions:
        patterns:
          - "*"
