name: Deploy VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target_ref:
        description: Git ref or SHA to deploy on the VPS
        required: false
        default: main

permissions:
  contents: read

concurrency:
  group: deploy-vps-${{ github.event_name == 'workflow_dispatch' && inputs.target_ref || github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Linux VPS
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      EBAYCF_VPS_HOST: ${{ secrets.EBAYCF_VPS_HOST }}
      EBAYCF_VPS_USER: ${{ secrets.EBAYCF_VPS_USER }}
      EBAYCF_VPS_PORT: ${{ secrets.EBAYCF_VPS_PORT }}
      EBAYCF_VPS_SSH_KNOWN_HOSTS: ${{ secrets.EBAYCF_VPS_SSH_KNOWN_HOSTS }}
      TARGET_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.target_ref || github.sha }}

    steps:
      - name: Checkout target revision
        uses: actions/checkout@v6
        with:
          ref: ${{ env.TARGET_REF }}

      - name: Validate deploy secrets
        env:
          EBAYCF_VPS_SSH_PRIVATE_KEY_B64: ${{ secrets.EBAYCF_VPS_SSH_PRIVATE_KEY_B64 }}
        run: |
          set -euo pipefail

          missing=0
          for var in EBAYCF_VPS_HOST EBAYCF_VPS_SSH_PRIVATE_KEY_B64; do
            if [ -z "${!var:-}" ]; then
              echo "::error::Missing required secret: ${var}"
              missing=1
            fi
          done

          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

      - name: Set deploy defaults
        run: |
          set -euo pipefail

          echo "EBAYCF_VPS_USER=${EBAYCF_VPS_USER:-opc}" >> "${GITHUB_ENV}"
          echo "EBAYCF_VPS_PORT=${EBAYCF_VPS_PORT:-22}" >> "${GITHUB_ENV}"

      - name: Prepare SSH key
        env:
          EBAYCF_VPS_SSH_PRIVATE_KEY_B64: ${{ secrets.EBAYCF_VPS_SSH_PRIVATE_KEY_B64 }}
        run: |
          set -euo pipefail

          mkdir -p "${HOME}/.ssh"
          printf '%s' "${EBAYCF_VPS_SSH_PRIVATE_KEY_B64}" | base64 --decode > "${HOME}/.ssh/ebaycf_vps"
          chmod 600 "${HOME}/.ssh/ebaycf_vps"

      - name: Prepare known_hosts
        run: |
          set -euo pipefail

          mkdir -p "${HOME}/.ssh"
          touch "${HOME}/.ssh/known_hosts"
          chmod 644 "${HOME}/.ssh/known_hosts"

          if [ -n "${EBAYCF_VPS_SSH_KNOWN_HOSTS:-}" ]; then
            printf '%s\n' "${EBAYCF_VPS_SSH_KNOWN_HOSTS}" > "${HOME}/.ssh/known_hosts"
            echo "SSH_STRICT=yes" >> "${GITHUB_ENV}"
          else
            echo "SSH_STRICT=accept-new" >> "${GITHUB_ENV}"
          fi

      - name: Sync repository to VPS
        run: |
          set -euo pipefail

          export COPYFILE_DISABLE=1

          tar \
            --exclude=.git \
            --exclude=.venv \
            --exclude=.mypy_cache \
            --exclude=.pytest_cache \
            --exclude=__pycache__ \
            --exclude='.coverage*' \
            -czf - . \
          | ssh \
              -i "${HOME}/.ssh/ebaycf_vps" \
              -p "${EBAYCF_VPS_PORT}" \
              -o BatchMode=yes \
              -o ConnectTimeout=15 \
              -o ServerAliveInterval=30 \
              -o StrictHostKeyChecking="${SSH_STRICT}" \
              "${EBAYCF_VPS_USER}@${EBAYCF_VPS_HOST}" \
              "sudo mkdir -p /opt/ebay-cf && sudo rm -rf /opt/ebay-cf/* /opt/ebay-cf/.[!.]* /opt/ebay-cf/..?* && sudo tar -xzf - -C /opt/ebay-cf"

      - name: Install and restart on VPS
        run: |
          set -euo pipefail

          ssh \
            -i "${HOME}/.ssh/ebaycf_vps" \
            -p "${EBAYCF_VPS_PORT}" \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            -o ServerAliveInterval=30 \
            -o StrictHostKeyChecking="${SSH_STRICT}" \
            "${EBAYCF_VPS_USER}@${EBAYCF_VPS_HOST}" \
            "APP_DIR=/opt/ebay-cf APP_USER=ebaycf APP_GROUP=ebaycf bash /opt/ebay-cf/deploy/install-vps.sh"
